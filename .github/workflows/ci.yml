name: CI - FinancasPro

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Testes (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: financaspro
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: financaspro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Auditoria de dependencias
        run: npm audit --audit-level=high

      - name: Testes
        run: npm run test:ci
        env:
          INTEGRATION_TEST_DATABASE_URL: postgresql://financaspro:testpass@localhost:5432/financaspro_test
          SKIP_INTEGRATION: ${{ matrix.node-version == '18.x' && '1' || '' }}

      - name: Instalar Chromium (Playwright)
        if: matrix.node-version == '20.x'
        run: npx playwright install chromium

      - name: Testes E2E
        if: matrix.node-version == '20.x'
        run: npm run test:e2e
        env:
          E2E_API: '1'
          INTEGRATION_TEST_DATABASE_URL: postgresql://financaspro:testpass@localhost:5432/financaspro_test

      - name: Gerar relatorio de cobertura
        if: matrix.node-version == '20.x'
        run: npm run test:coverage

      - name: Upload relatorio de cobertura
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Verificar resultado dos testes
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Testes falharam - pipeline bloqueado"
            exit 1
          fi
          echo "Todos os testes passaram"
